<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Essential Meta Tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Fonts: loaded here (not via JS @import) so font requests start immediately
         instead of waiting for the JS bundle to load, parse, and inject a <style> tag. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#1f3a7d" />
    <meta name="description" content="Move from confusion to clarity. 1-on-1 AI, Excel & Finance coaching by Aaron Pacheco in Australia. Master self-sufficiency." />
    <meta name="keywords" content="AI coaching, Excel coaching, Finance coaching, Business coaching, Australia" />
    <meta name="author" content="Aaron Pacheco" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://appcoaching.io/" />
    <meta property="og:title" content="Your Most Expensive Problem: Confusion — AppCoaching" />
    <meta property="og:description" content="Move from confusion to clarity with 1-on-1 AI, Excel & Finance coaching. Real experience. Real results." />
    <meta property="og:image" content="https://appcoaching.io/Aaron_Pacheco_300dpi_001_6x6.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Most Expensive Problem: Confusion — AppCoaching" />
    <meta name="twitter:description" content="Move from confusion to clarity with AI, Excel & Finance coaching." />
    <meta name="twitter:image" content="https://appcoaching.io/Aaron_Pacheco_300dpi_001_6x6.jpg" />

    <!-- Google Site Verification & Analytics -->
    <meta name="google-site-verification" content="yi5jdpycQ4YPGxXSuWdH3vUpoVVGPuFO-RMCbwCybgc" />

    <!-- Canonical URL (prevents duplicate content issues) -->
    <link rel="canonical" href="https://appcoaching.io/" />

    <!--
      Note: Organization/Service/Person schema is intentionally NOT duplicated here as static
      JSON-LD. It is injected dynamically per-page by src/App.jsx (see organizationSchema,
      personSchema, and pageConfigs) via updateMetaTags(), which keeps a single accurate source
      of truth instead of two schema blocks that can drift out of sync. Netlify prerendering
      (enabled in site settings) ensures bots that don't execute JS still receive the fully
      rendered, JS-injected version of this markup.
    -->

    <title>Your Most Expensive Problem: Confusion | APP Coaching</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!--
      Hidden static form for Netlify Forms detection.
      Netlify's build-time bot scans the built HTML for <form> tags to register them —
      it cannot see forms rendered client-side by React. This hidden replica has the
      same name and field names as the real React contact form, so Netlify registers
      "contact" as a valid form and routes AJAX submissions from the real form to it.
      Do not remove: without this, contact form submissions silently fail.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="interest"><option>placeholder</option></select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
